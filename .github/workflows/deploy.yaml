name: Publish

on:
  push:
    branches:
      - main

jobs:
  publish:
    environment: release
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Build and Publish to PyPI
        run: |
          uv build --package hundredandten-engine
          uv publish dist/hundredandten_engine-*
