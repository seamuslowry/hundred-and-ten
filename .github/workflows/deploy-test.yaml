name: Publish (Test)

on:
  push:
    # branches:
    #   - test/*

jobs:
  publish:
    environment: test
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Build and Publish to Test PyPI
        # run: |
        #   uv version --package hundredandten-deck --bump patch --bump dev=${{ github.run_number }}
        #   uv version --package hundredandten-engine --bump patch --bump dev=${{ github.run_number }}
        #   uv version --package hundredandten-state --bump patch --bump dev=${{ github.run_number }}
        #   uv version --package hundredandten-automation-naive --bump patch --bump dev=${{ github.run_number }}
        #   uv build --package hundredandten-deck
        #   uv build --package hundredandten-engine
        #   uv build --package hundredandten-state
        #   uv build --package hundredandten-automation-naive
        #   uv publish --index testpypi
        run: |
          uv build --package hundredandten-deck
          uv build --package hundredandten-engine
          uv build --package hundredandten-state
          uv build --package hundredandten-automation-naive
          uv publish --index testpypi
