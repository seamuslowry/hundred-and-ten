name: Publish (Test)

on:
  push:
    branches:
      - test/*

jobs:
  publish:
    environment: test
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Build and Publish to Test PyPI
        run: |
          uv version --package hundredandten-engine $(uv version --package hundredandten-engine --short).dev${{ github.run_number }}
          uv build --package hundredandten-engine
          uv publish --index testpypi dist/hundredandten_engine-*
