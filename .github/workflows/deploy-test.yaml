name: Publish (Test)

on:
  push:
    branches:
      - test/*

jobs:
  publish:
    environment: test
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Build and Publish to Test PyPI
        run: |
          uv version $(uv version --short).dev${{ github.run_number }}
          uv build
          uv publish --publish-url https://upload.test.pypi.org/legacy/
