[tool.uv.workspace]
members = ["packages/*"]

[dependency-groups]
lint = [
    "pylint==4.0.5",
    "pyright==1.1.408",
    "ruff==0.15.9",
    "black==26.3.1",
]
test = [
    "coverage==7.13.5",
    "hundredandten-testing",
    "pytest==9.0.2"
]

[tool.pylint.design]
# Allow Settings/Config classes to have no methods
min-public-methods = 0

[tool.ruff]
target-version = "py314"
line-length = 100
lint.extend-select = ["I"]

[tool.black]
target-version = ["py314"]

[tool.uv]
check-url = "https://pypi.org/simple/"

[tool.uv.sources]
hundredandten-engine = { workspace = true }
hundredandten-automation = { workspace = true }
hundredandten-testing = { workspace = true }

[[tool.uv.index]]
name = "testpypi"
url = "https://test.pypi.org/simple/"
publish-url = "https://test.pypi.org/legacy/"
explicit = true
