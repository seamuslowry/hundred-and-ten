name: Tag and Publish

on:
  push:
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Build and Publish to PyPI
        run: |
          uv build
          uv publish --token "${{ secrets.PYPI_API_TOKEN }}"
