name: Code Quality

on:
  - push

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - run: uv sync --locked --group lint

      - name: PyLint
        run: |
          py_files=($(find packages -name '*.py' -type f))
          uv run pylint "${py_files[@]}"

      - name: Pyright
        run: uv run pyright

      - name: Ruff check
        run: uv run ruff check .

      - name: Black check
        run: uv run black --check .
